<!-- @dsCard group="Patterns" viewport="1280x720" name="Inbox Zero — the rest state in context" subtitle="Full-bleed daily photo (rotated from Unsplash) with the app chrome translucent on top; 'You've hit Inbox Zero!' + your streak below" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html, body { height: 100%; }
  body { margin: 0; background: var(--bg-base); }
  #root { height: 100%; }
  .app { position: relative; height: 100%; width: 100%; overflow: hidden; }
  /* chrome dims onto the photo, like the reference */
  .topscrim { position: absolute; top: 0; left: 0; right: 0; height: 96px; background: linear-gradient(to bottom, rgba(0,0,0,0.30), transparent); pointer-events: none; }
  .rail { position: absolute; top: 60px; left: 16px; display: flex; flex-direction: column; gap: 14px; color: rgba(255,255,255,0.55); font-size: 17px; text-shadow: 0 1px 3px rgba(0,0,0,0.4); }
  .topbar { position: absolute; top: 0; left: 0; right: 0; height: 52px; display: flex; align-items: center; gap: 22px; padding: 0 20px; color: rgba(255,255,255,0.62); text-shadow: 0 1px 3px rgba(0,0,0,0.4); }
  .topbar .mark { display: flex; align-items: center; gap: 10px; font-size: 14px; white-space: nowrap; }
  .topbar .tab { font-size: 15px; letter-spacing: -0.01em; cursor: default; }
  .topbar .tab.active { color: rgba(255,255,255,0.98); font-weight: 600; }
  .topbar .n { font-size: 11.5px; opacity: 0.8; margin-left: 5px; }
  .topbar .icons { margin-left: auto; display: flex; align-items: center; gap: 16px; font-size: 16px; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { RestState } = ((Object.entries(window).find(([k])=>/MailDesignSystem_/.test(k))||[])[1]||{});
  const TABS = [
    { name: "Important", active: true },
    { name: "Travel", n: 17 },
    { name: "Invoices" },
    { name: "News" },
    { name: "Other", n: 1 },
  ];
  function App() {
    return (
      <div className="app">
        <RestState streak={12} />
        <div className="topscrim" />
        <div className="rail"><span aria-hidden>{"✉"}</span><span aria-hidden>{"▦"}</span></div>
        <div className="topbar">
          <span className="mark"><span aria-hidden>{"☰"}</span><img src="../assets/snail-mail-logo-on-dark.svg" alt="Snail Mail" style={{height:18,width:"auto",display:"block"}} /></span>
          {TABS.map((t) => (
            <span key={t.name} className={"tab" + (t.active ? " active" : "")}>
              {t.name}{t.n != null && <span className="n">{t.n}</span>}
            </span>
          ))}
          <span className="icons"><span aria-hidden>{"✎"}</span><span aria-hidden>{"⌕"}</span></span>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
